<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>浄満寺 門徒参り管理 v4</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1208;--ink-light:#4a3c2a;
  --paper:#faf7f2;--paper-warm:#f5efe4;
  --gold:#b8860b;--gold-light:#d4a843;--gold-pale:#f0e6c8;
  --red:#8b1a1a;--green:#2d5a27;
  --border:#d4c4a0;--shadow:rgba(26,18,8,0.15);
}
body{background:var(--paper);font-family:'Noto Sans JP',sans-serif;color:var(--ink);-webkit-tap-highlight-color:transparent;}
.screen{display:none;min-height:100dvh;flex-direction:column;}
.screen.active{display:flex;}

/* LOGIN */
#screen-login{background:var(--ink);align-items:center;justify-content:center;padding:32px 24px;}
.login-lotus{font-size:64px;margin-bottom:8px;text-align:center;}
.login-title{font-family:'Noto Serif JP',serif;color:var(--gold-light);font-size:22px;font-weight:600;letter-spacing:.2em;margin-bottom:6px;text-align:center;}
.login-sub{color:#888;font-size:13px;margin-bottom:40px;text-align:center;}
.login-card{background:rgba(255,255,255,.05);border:1px solid #333;border-radius:12px;padding:24px;width:100%;max-width:360px;}
.login-label{color:#aaa;font-size:12px;margin-bottom:6px;display:block;}
.login-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.08);border:1px solid #444;border-radius:8px;color:white;font-size:15px;font-family:'Noto Sans JP',sans-serif;outline:none;margin-bottom:12px;}
.login-input option{color:var(--ink);background:white;}
.login-btn{width:100%;padding:12px;background:var(--gold);color:var(--ink);border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:'Noto Serif JP',serif;cursor:pointer;letter-spacing:.1em;margin-top:8px;}
.login-err{color:#f66;font-size:12px;margin-bottom:8px;}

/* APP */
#screen-app{background:var(--paper);}
.header{background:var(--ink);color:var(--gold-light);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px var(--shadow);}
.header-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:600;letter-spacing:.1em;}
.header-sub{font-size:11px;color:#a08060;margin-top:2px;}
.user-badge{background:var(--gold);color:var(--ink);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;cursor:pointer;border:none;}
.nav-tabs{display:flex;background:var(--ink);border-top:1px solid #333;overflow-x:auto;}
.nav-tab{flex:1;min-width:64px;padding:10px 2px;text-align:center;font-size:10px;color:#888;cursor:pointer;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;}
.nav-tab.active{color:var(--gold-light);}
.nav-tab-icon{font-size:17px;}
.tab-content{display:none;padding:16px;max-width:800px;margin:0 auto;width:100%;flex:1;overflow-y:auto;}
.tab-content.active{display:block;}

/* CARDS */
.card{background:white;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px var(--shadow);border:1px solid var(--border);}
.card-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;color:var(--ink);}
.card-sub{font-size:12px;color:var(--ink-light);margin-top:2px;}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.badge-monthly{background:#e8f4e8;color:var(--green);}
.badge-hooji{background:#ffeaea;color:var(--red);}
.badge-other{background:var(--gold-pale);color:var(--gold);}
.badge-scheduled{background:#e8eaf6;color:#3949ab;}
.badge-done{background:#e8f5e9;color:#2e7d32;}
.badge-kinen{background:#fff3e0;color:#e65100;}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;transition:opacity .2s;}
.btn:active{opacity:.7;}
.btn-primary{background:var(--ink);color:var(--gold-light);}
.btn-gold{background:var(--gold);color:white;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--ink-light);}
.contact-list-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--paper-warm);}
.contact-list-item:last-child{border-bottom:none;}
.contact-list-item:hover,.contact-list-item.selected{background:var(--gold);color:white;}
.contact-list-item .item-kana{font-size:10px;color:var(--ink-light);margin-top:1px;}
.contact-list-item.selected .item-kana{color:rgba(255,255,255,0.8);}
.btn-danger{background:var(--red);color:white;}
.btn-green{background:var(--green);color:white;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-full{width:100%;}
.fab{background:var(--ink);color:var(--gold-light);border:none;border-radius:50%;width:52px;height:52px;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:fixed;bottom:80px;right:20px;box-shadow:0 4px 14px var(--shadow);z-index:50;line-height:1;}

/* FORMS */
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:12px;color:var(--ink-light);margin-bottom:4px;font-weight:500;}
.form-control{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--paper);color:var(--ink);outline:none;transition:border-color .2s;}
.form-control:focus{border-color:var(--gold);}
textarea.form-control{resize:vertical;min-height:80px;}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}

/* CHIP */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border);cursor:pointer;background:white;color:var(--ink-light);user-select:none;}
.chip.selected{background:var(--ink);color:var(--gold-light);border-color:var(--ink);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--paper);width:100%;max-height:92dvh;border-radius:16px 16px 0 0;overflow-y:auto;padding:20px 16px 48px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:600;margin-bottom:16px;color:var(--ink);text-align:center;}
.modal-btn-row{display:flex;gap:10px;margin-top:16px;}

/* SECTION */
.section-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--ink-light);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:12px;letter-spacing:.05em;}

/* SCHEDULE CARD */
.scard{display:flex;gap:12px;}
.scard-date{min-width:48px;text-align:center;}
.scard-day{font-size:24px;font-weight:700;font-family:'Noto Serif JP',serif;color:var(--ink);line-height:1;}
.scard-month{font-size:11px;color:var(--ink-light);}
.scard-info{flex:1;}
.scard-name{font-size:15px;font-weight:500;cursor:pointer;border-bottom:1px solid var(--border);}
.scard-monk{font-size:11px;color:var(--gold);margin-top:3px;}
.scard-prev{margin-top:6px;padding:6px 8px;background:var(--paper-warm);border-radius:4px;font-size:11px;color:var(--ink-light);}
.scard-btns{display:flex;gap:8px;margin-top:10px;justify-content:flex-end;}

/* HISTORY */
.hist-item{padding:12px;background:var(--paper-warm);border-radius:6px;margin-bottom:8px;border-left:3px solid var(--gold);}
.hist-meta{font-size:11px;color:var(--ink-light);margin-bottom:4px;}
.hist-content{font-size:13px;line-height:1.6;}

/* AI */
.ai-box{background:linear-gradient(135deg,#1a1208,#2a1e0e);border-radius:8px;padding:14px;margin-top:10px;color:var(--gold-pale);}
.ai-box-title{font-size:11px;color:var(--gold);margin-bottom:6px;letter-spacing:.1em;}
.ai-box-content{font-size:13px;line-height:1.7;}

/* SPINNER */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* MISC */
.search-wrap{position:relative;margin-bottom:12px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-light);}
.search-input{padding-left:30px!important;}
.empty{text-align:center;padding:48px 16px;color:var(--ink-light);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--gold-pale);color:var(--gold);}
.note-box{padding:8px 10px;background:var(--gold-pale);border-radius:6px;font-size:13px;margin-bottom:12px;line-height:1.6;}
.flex-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.faded{opacity:.6;}
.kinen-alert{background:#fff3e0;border:1px solid #ffcc80;border-radius:6px;padding:8px 10px;font-size:12px;color:#e65100;margin-bottom:8px;}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-title{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:600;}
.cal-nav-btn{background:var(--ink);color:var(--gold-light);border:none;border-radius:6px;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.cal-view-btn{padding:5px 14px;font-size:12px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;background:white;color:var(--ink-light);}
.cal-view-btn.active{background:var(--ink);color:var(--gold-light);}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px;}
.cal-dow{text-align:center;font-size:11px;color:var(--ink-light);padding:4px 0;font-weight:500;}
.cal-dow:first-child{color:#c0392b;}
.cal-dow:last-child{color:#2563eb;}
.cal-weeks{display:flex;flex-direction:column;gap:2px;}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{min-height:56px;background:white;border-radius:4px;border:1px solid var(--border);padding:3px;cursor:pointer;transition:background .15s;}
.cal-cell:active{background:var(--paper-warm);}
.cal-cell.other-month{background:var(--paper-warm);opacity:.5;}
.cal-cell.today .cal-cell-day{background:var(--gold);color:white;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cal-cell.sunday .cal-cell-day{color:#c0392b;}
.cal-cell.saturday .cal-cell-day{color:#2563eb;}
.cal-cell-day{font-size:12px;font-weight:600;line-height:20px;text-align:center;margin-bottom:2px;}
.cal-event-pill{font-size:9px;padding:1px 4px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;margin-top:1px;}
.cal-event-monthly{background:#e8f4e8;color:var(--green);}
.cal-event-hooji{background:#ffeaea;color:var(--red);}
.cal-event-other{background:var(--gold-pale);color:var(--gold);}
.week-day-row{display:flex;gap:0;border-bottom:1px solid var(--border);}
.week-day-header{min-width:44px;padding:8px 4px;text-align:center;border-right:1px solid var(--border);background:var(--paper-warm);cursor:pointer;}
.week-day-name{font-size:11px;color:var(--ink-light);}
.week-day-num{font-size:18px;font-weight:700;font-family:'Noto Serif JP',serif;line-height:1.2;}
.week-day-num.today-num{color:var(--gold);border-bottom:2px solid var(--gold);}
.week-day-num.sun{color:#c0392b;}
.week-day-num.sat{color:#2563eb;}
.week-events{flex:1;padding:6px 8px;min-height:48px;display:flex;flex-direction:column;gap:4px;}
.week-event{padding:4px 8px;border-radius:5px;font-size:12px;cursor:pointer;border-left:3px solid;}
.week-event-monthly{background:#e8f4e8;border-color:var(--green);}
.week-event-hooji{background:#ffeaea;border-color:var(--red);}
.week-event-other{background:var(--gold-pale);border-color:var(--gold);}
.week-event-name{font-weight:600;color:var(--ink);}
.week-event-monk{font-size:10px;margin-top:1px;color:var(--ink-light);}

/* PRINT STYLES */
@media print{
  body{background:white;font-size:12px;}
  .no-print{display:none!important;}
  .print-only{display:block!important;}
  /* 一覧印刷 */
  .print-table{width:100%;border-collapse:collapse;font-size:11px;}
  .print-table th{background:#f0e6c8;border:1px solid #ccc;padding:4px 6px;text-align:left;font-family:'Noto Serif JP',serif;}
  .print-table td{border:1px solid #ddd;padding:4px 6px;vertical-align:top;}
  .print-table tr:nth-child(even) td{background:#fafafa;}
  /* はがき */
  .hagaki-page{width:100mm;height:148mm;page-break-after:always;padding:8mm;display:flex;flex-direction:column;justify-content:center;}
  .hagaki-zip{font-size:16px;letter-spacing:4px;margin-bottom:6mm;}
  .hagaki-addr{font-size:13px;line-height:2;writing-mode:vertical-rl;margin-left:auto;margin-right:10mm;}
  .hagaki-name{font-size:18px;font-weight:bold;writing-mode:vertical-rl;margin-left:auto;}
  /* タックシール A4 24面 (3列×8行) */
  .seal-page{display:grid;grid-template-columns:repeat(3,1fr);gap:0;width:210mm;margin:0 auto;}
  .seal-item{width:70mm;height:37mm;padding:3mm 4mm;display:flex;flex-direction:column;justify-content:center;border:0.5px dashed #ccc;font-size:10px;}
  .seal-zip{font-size:9px;margin-bottom:1mm;}
  .seal-addr{font-size:9px;line-height:1.4;margin-bottom:1mm;}
  .seal-name{font-size:13px;font-weight:bold;}
  @page{margin:10mm;}
  @page .hagaki-page{size:100mm 148mm;margin:0;}
}
.print-only{display:none;}
.cal-event-temple{background:#e8d5f5;color:#6a0dad;font-size:9px;}
.week-event-temple{border-left:3px solid #9b59b6;background:#f5eeff;}
.badge-temple{background:#e8d5f5;color:#6a0dad;}
.attach-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.attach-row .form-control{flex:1;font-size:13px;padding:6px 8px;}
.attach-label{font-size:11px;color:var(--ink-light);white-space:nowrap;}
.attach-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--gold);text-decoration:none;padding:3px 8px;border:1px solid var(--border);border-radius:4px;margin:2px 2px 2px 0;background:var(--paper-warm);}
.attach-link:hover{background:var(--gold-pale);}

/* CONTACTS TABLE */
.contact-table-wrap{overflow-x:auto;margin-bottom:12px;}
.contact-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px;}
.contact-table th{background:var(--ink);color:var(--gold-light);padding:8px 10px;text-align:left;font-family:'Noto Serif JP',serif;font-weight:500;cursor:pointer;white-space:nowrap;}
.contact-table th:hover{background:#2a1e0e;}
.contact-table td{border-bottom:1px solid var(--border);padding:8px 10px;vertical-align:middle;}
.contact-table tr:hover td{background:var(--paper-warm);cursor:pointer;}
.sort-arrow{margin-left:4px;opacity:.5;font-size:10px;}
.sort-arrow.active{opacity:1;}

/* KINEN TABLE */
.kinen-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--paper-warm);}
.kinen-item:last-child{border-bottom:none;}
.kinen-date{font-size:12px;color:var(--ink-light);min-width:80px;}
.kinen-name{font-size:13px;font-weight:500;flex:1;}
.kinen-kaiki{font-size:11px;color:var(--red);}

@media(min-width:600px){
  .modal-overlay{align-items:center;}
  .modal-sheet{max-width:600px;margin:0 auto;border-radius:12px;max-height:88dvh;}
  .cal-cell{min-height:72px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-lotus">🪷</div>
  <div class="login-title">浄満寺</div>
  <div class="login-sub">門徒参り管理システム</div>
  <div class="login-card">
    <label class="login-label">担当者</label>
    <select id="login-user" class="login-input" style="color:#888">
      <option value="">選択してください</option>
      <option>道純</option><option>恭子</option><option>秀章</option>
      <option>紘子</option><option>智子</option><option>佳菜子</option><option>大信</option>
    </select>
    <label class="login-label">パスワード</label>
    <input id="login-pass" type="password" class="login-input" placeholder="パスワードを入力">
    <div style="font-size:11px;color:#666;margin-bottom:8px">初回は共通の初期パスワードでログインしてください</div>
    <div id="login-err" class="login-err" style="display:none"></div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- APP -->
<div id="screen-app" class="screen">
  <div class="header">
    <div><div class="header-title">🪷 浄満寺</div><div class="header-sub">門徒参り管理</div></div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="sync-status" style="font-size:10px;display:none"></span>
      <button class="btn btn-outline btn-sm" style="font-size:11px;padding:4px 8px;color:var(--gold-light);border-color:#444" onclick="exportBackup()" title="バックアップ">💾</button>
      <button class="btn btn-outline btn-sm" style="font-size:11px;padding:4px 8px;color:var(--gold-light);border-color:#444" onclick="loadFromSheet()" title="最新データを取得">🔄</button>
      <button class="btn btn-outline btn-sm" style="font-size:11px;padding:4px 8px;color:var(--gold-light);border-color:#444" onclick="openChangePw(state.currentUser,false)" title="パスワード変更">🔑</button>
      <button class="user-badge" id="user-badge-btn" onclick="doLogout()"></button>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('calendar',this)"><span class="nav-tab-icon">🗓️</span>カレンダー</button>
    <button class="nav-tab" onclick="switchTab('schedule',this)"><span class="nav-tab-icon">📅</span>予定</button>
    <button class="nav-tab" onclick="switchTab('events',this)"><span class="nav-tab-icon">🏯</span>行事</button>
    <button class="nav-tab" onclick="switchTab('history',this)"><span class="nav-tab-icon">📖</span>記録</button>
    <button class="nav-tab" onclick="openVisitModal(null,null)"><span class="nav-tab-icon">✏️</span>記録追加</button>
    <button class="nav-tab" onclick="switchTab('contacts',this)"><span class="nav-tab-icon">🏠</span>門徒</button>
  </div>

  <!-- TAB: SCHEDULE -->
  <div id="tab-schedule" class="tab-content">
    <div class="flex-between">
      <div class="chip-row">
        <div class="chip selected" id="filter-all" onclick="setFilter('all')">全員</div>
        <div class="chip" id="filter-my" onclick="setFilter('my')">自分のみ</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openScheduleModal(null)">＋予定追加</button>
    </div>
    <div id="kinen-alerts"></div>
    <div id="schedule-list"></div>
  </div>

  <!-- TAB: CALENDAR -->
  <div id="tab-calendar" class="tab-content active">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calMove(-1)">&#8249;</button>
      <div class="cal-nav-title" id="cal-title"></div>
      <button class="cal-nav-btn" onclick="calMove(1)">&#8250;</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div class="cal-view-toggle">
        <button class="cal-view-btn active" id="cal-btn-month" onclick="setCalView('month')">月</button>
        <button class="cal-view-btn" id="cal-btn-week" onclick="setCalView('week')">週</button>
      </div>
      <div class="chip-row">
        <div class="chip selected" id="cal-filter-all" onclick="setCalFilter('all')">全員</div>
        <div class="chip" id="cal-filter-my" onclick="setCalFilter('my')">自分</div>
      </div>
    </div>
    <div id="cal-body"></div>
  </div>

  <!-- TAB: CONTACTS -->
  <div id="tab-contacts" class="tab-content">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="form-control search-input" id="contact-search" placeholder="お名前・住所・よみがなで検索" oninput="renderContacts()">

function isPwExpired(user){
  const info = getUserPwInfo(user);
  if(info.isInitial || !info.setAt) return false; // 初期PWは期限なし（変更を促すだけ）
  const setDate = new Date(info.setAt);
  const now = new Date();
  return (now - setDate) > PW_EXPIRE_DAYS * 24 * 60 * 60 * 1000;
}
function validatePw(pw){
  // 8文字以上、英字・数字・記号のうち2種類以上
  if(pw.length < 8) return "8文字以上で入力してください";
  const hasAlpha = /[a-zA-Z]/.test(pw);
  const hasNum = /[0-9]/.test(pw);
  const hasSym = /[^a-zA-Z0-9]/.test(pw);
  const types = [hasAlpha, hasNum, hasSym].filter(Boolean).length;
  if(types < 2) return "英字・数字・記号のうち2種類以上を含めてください";
  return null; // OK
}

function saveChangePw(){
  const user = state._cpwUser;
  const newPw = document.getElementById('cpw-new').value;
  const confirm2 = document.getElementById('cpw-confirm').value;
  const errEl = document.getElementById('cpw-err');
  if(newPw !== confirm2){ errEl.textContent = "パスワードが一致しません"; return; }
  const err = validatePw(newPw);
  if(err){ errEl.textContent = err; return; }
  if(newPw === INITIAL_PASSWORD){ errEl.textContent = "初期パスワードは使用できません"; return; }
  setUserPw(user, newPw);
  closeChangePw();
  // 強制変更後はそのままログイン続行
  if(state._cpwForced){
    proceedLogin(user);
  }
}

function exportBackup(){
  const data = {
    exportedAt: new Date().toISOString(),
    contacts: state.contacts,
    visits: state.visits,
    schedules: state.schedules,
    templeEvents: state.templeEvents
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:"application/json;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  a.download = `jomanji_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  setSyncStatus("✓ バックアップを保存しました");
  setTimeout(()=>setSyncStatus(""),3000);
}

// 全データ読み込み（起動時・手動更新）
async function loadFromSheet(){
  if(!gasEnabled())return;
  setSyncStatus("🔄 読み込み中...");
  try{
    const res=await fetch(GAS_URL);
    const json=await res.json();
    if(!json.ok)throw new Error(json.error);
    const d=json.data;
    if(d.contacts&&d.contacts.length)    state.contacts    =d.contacts.map(c=>({...c,
      kinen:parseField(c.kinen,[]),tags:parseField(c.tags,[]),attachments:parseField(c.attachments,[])}));
    if(d.visits&&d.visits.length)        state.visits      =d.visits.map(v=>({...v,date:normDate(v.date),
      monk:parseField(v.monk,[]),attachments:parseField(v.attachments,[])}));
    if(d.schedules&&d.schedules.length)  state.schedules   =d.schedules.map(s=>({...s,date:normDate(s.date),
      monk:parseField(s.monk,[]),attachments:parseField(s.attachments,[])}));
    if(d.templeEvents&&d.templeEvents.length) state.templeEvents=d.templeEvents.map(e=>({...e,date:normDate(e.date),
      attendees:parseField(e.attendees,[]),attachments:parseField(e.attachments,[]),records:parseField(e.records,[])}));
    autoComplete();
    renderAll();
    setSyncStatus("✓ 最新データを反映 "+new Date().toLocaleTimeString('ja-JP'));
    setTimeout(()=>setSyncStatus(""),4000);
  }catch(err){
    setSyncStatus("⚠ 読み込みエラー: "+err.message, true);
  }
}

// ==================== UTILS ====================
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dateToStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function normDate(d){if(!d)return"";return String(d).replace(/\//g,"-").slice(0,10);}
function parseLocalDate(d){if(!d)return null;const p=String(d).slice(0,10).split("-");return p.length===3?{y:+p[0],m:+p[1],day:+p[2]}:null;}
function parseField(v,def){if(v===null||v===undefined||v==="")return def;if(typeof v==="string"){try{return JSON.parse(v);}catch(e){return def;}}return v;}
function monkStr(monk){if(!monk)return"";if(Array.isArray(monk))return monk.join("・");return String(monk);}
function fmtDate(d){const p=parseLocalDate(d);if(!p)return"";return`${p.m}月${p.day}日`;}
function fmtFull(d){const p=parseLocalDate(d);if(!p)return"";return`${p.y}年${p.m}月${p.day}日`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getContact(id){return state.contacts.find(c=>c.id===id)||{name:"不明",address:"",kana:"",zip:"",phone:"",email:"",shu:"",houmyo:"",haka:"",family:"",kinen:[],notes:"",tags:[],attachments:[]};}
function getVisitsByContact(cid){return[...state.visits].filter(v=>v.contactId===cid).sort((a,b)=>b.date.localeCompare(a.date));}
function badgeClass(type){return type==="月参り"?"badge-monthly":type==="法事"?"badge-hooji":"badge-other";}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// 年忌計算
function calcKaiki(kinenDate){
  if(!kinenDate)return null;
  const p=parseLocalDate(kinenDate);
  if(!p)return null;
  const now=new Date();
  const results=[];
  for(const [yr,nm] of Object.entries(KAIKI_NAMES)){
    const y=parseInt(yr);
    const targetYear=p.y+y;
    if(targetYear>=now.getFullYear()&&targetYear<=now.getFullYear()+1){
      results.push({year:targetYear,kaiki:nm,month:p.m,day:p.day});
    }
  }
  return results;
}

// ==================== LOGIN ====================
function doLogin(){
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  if(!user){ err.textContent="担当者を選択してください"; err.style.display="block"; return; }
  const info = getUserPwInfo(user);
  if(pass !== info.pw){ err.textContent="パスワードが違います"; err.style.display="block"; return; }
  err.style.display="none";
  // 初期PWのままなら変更を強制
  if(info.isInitial){
    state._pendingLoginUser = user;
    openChangePw(user, true);
    return;
  }
  // パスワード期限切れ
  if(isPwExpired(user)){
    state._pendingLoginUser = user;
    openChangePw(user, true);
    document.getElementById('cpw-forced-msg').textContent = "パスワードの有効期限（90日）が切れました。新しいパスワードを設定してください。";
    return;
  }
  proceedLogin(user);
}
function proceedLogin(user){
  state.currentUser = user;
  const now=new Date(); const day=now.getDay(); const diff=day===0?-6:1-day;
  const mon=new Date(now); mon.setDate(now.getDate()+diff);
  state.calWeekStart = dateToStr(mon);
  document.getElementById('user-badge-btn').textContent = user+" ▾";
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  renderAll();
  loadFromSheet();
  // 期限まで30日以内なら警告
  const info = getUserPwInfo(user);
  if(!info.isInitial && info.setAt){
    const setDate = new Date(info.setAt);
    const daysLeft = PW_EXPIRE_DAYS - Math.floor((new Date()-setDate)/(24*60*60*1000));
    if(daysLeft <= 30){
      setTimeout(()=>setSyncStatus(`⚠ パスワードの有効期限まで残り${daysLeft}日です`, true), 2000);
    }
  }
}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==="Enter")doLogin();});

}

function autoComplete(){
  const todayStr=today();
  // 予定
  state.schedules.forEach(s=>{
    if(s.status==='予定' && s.date < todayStr){
      s.status='完了';
      saveToSheet('schedules', s);
    }
  });
  // 行事
  state.templeEvents.forEach(e=>{
    if(e.status==='予定' && e.date < todayStr){
      e.status='完了';
      saveToSheet('templeEvents', e);
    }
  });
}

function setFilter(f){
  state.scheduleFilter=f;
  document.getElementById('filter-all').classList.toggle('selected',f==='all');
  document.getElementById('filter-my').classList.toggle('selected',f==='my');
  renderSchedule();
}

function renderSchedule(){
  // 年忌アラート
  const alerts=[];
  const thisYear=new Date().getFullYear();
  state.contacts.forEach(c=>{
    (c.kinen||[]).forEach(k=>{
      const res=calcKaiki(k.date);
      (res||[]).forEach(r=>{
        if(r.year===thisYear||r.year===thisYear+1){
          alerts.push(`${esc(c.name)} ${esc(k.name)}様 ${r.year}年${r.month}月${r.day}日 <strong>${r.kaiki}</strong>${r.year===thisYear+1?' (来年)':''}`);
        }
      });
    });
  });
  const alertEl=document.getElementById('kinen-alerts');
  if(alerts.length>0){
    alertEl.innerHTML=`<div class="kinen-alert">🔔 年忌のご案内: ${alerts.join(' ／ ')}</div>`;
  } else alertEl.innerHTML="";

  const now=today();

  // 門徒参り予定
  let scheds=[...state.schedules].sort((a,b)=>a.date.localeCompare(b.date));
  if(state.scheduleFilter==='my')scheds=scheds.filter(s=>s.monk===state.currentUser);

  // 寺院行事予定（フィルター適用）
  let tevs=[...state.templeEvents].sort((a,b)=>a.date.localeCompare(b.date));
  if(state.scheduleFilter==='my')tevs=tevs.filter(e=>(e.attendees||[]).includes(state.currentUser));

  // 日付順に統合してセクション分け
  const allItems=[
    ...scheds.map(s=>({...s,_kind:'sched'})),
    ...tevs.map(e=>({...e,_kind:'event'}))
  ].sort((a,b)=>a.date.localeCompare(b.date));

  const upcoming=allItems.filter(x=>x.date>=now&&x.status!=="完了");
  const past=allItems.filter(x=>x.date<now||x.status==="完了");

  let html="";
  if(upcoming.length===0&&past.length===0){html=`<div class="empty"><div class="empty-icon">📅</div><div>予定がありません</div></div>`;}
  if(upcoming.length>0){
    html+=`<div class="section-title">今後の予定</div>`;
    upcoming.forEach(x=>{html+=x._kind==='event'?eventCard(x,false):schedCard(x,false);});
  }
  if(past.length>0){
    html+=`<div class="section-title" style="margin-top:16px">過去・完了</div>`;
    past.slice(0,8).forEach(x=>{html+=x._kind==='event'?eventCard(x,true):schedCard(x,true);});
  }
  document.getElementById('schedule-list').innerHTML=html;
}

function openDetail(cid){
  state.detailContactId=cid;
  const c=getContact(cid);
  const cv=getVisitsByContact(cid);
  const cs=state.schedules.filter(s=>s.contactId===cid&&s.date>=today()).sort((a,b)=>a.date.localeCompare(b.date));
  const csPast=state.schedules.filter(s=>s.contactId===cid&&s.date<today()).sort((a,b)=>b.date.localeCompare(a.date));

  document.getElementById('detail-name').textContent=c.name;
  document.getElementById('detail-kana').textContent=c.kana||"";
  document.getElementById('detail-addr').textContent=(c.zip?"〒"+c.zip+" ":"")+c.address;

  let info="";
  if(c.phone)info+=`📞 ${esc(c.phone)}　`;
  if(c.email)info+=`📧 ${esc(c.email)}　`;
  if(c.shu)info+=`<br>宗派: ${esc(c.shu)}`;
  if(c.houmyo)info+=`　法名: ${esc(c.houmyo)}`;
  if(c.haka)info+=`　⛩ 墓地: ${esc(c.haka)}`;
  if(c.family)info+=`<br>家族: ${esc(c.family)}`;
  document.getElementById('detail-info').innerHTML=info;

  const notesEl=document.getElementById('detail-notes');
  if(c.notes){notesEl.innerHTML="📝 "+esc(c.notes);notesEl.style.display="block";}
  else notesEl.style.display="none";

  // 添付リンク
  const attachEl=document.getElementById('detail-attachments');
  const aLinks=renderAttachLinks(c.attachments);
  if(aLinks){attachEl.innerHTML=`<div style="margin-bottom:8px">${aLinks}</div>`;attachEl.style.display="block";}
  else attachEl.style.display="none";

  // 年忌
  let kinenHtml="";
  (c.kinen||[]).forEach(k=>{
    const res=calcKaiki(k.date);
    (res||[]).forEach(r=>{
      kinenHtml+=`<div class="kinen-alert">🔔 ${esc(k.name)}様 ${r.year}年${r.month}月${r.day}日 <strong>${r.kaiki}</strong>${r.year===new Date().getFullYear()+1?' (来年)':' (今年)'}</div>`;
    });
  });
  document.getElementById('detail-kinen').innerHTML=kinenHtml;

  // 今後の予定
  let schedHtml="";
  if(cs.length>0){
    schedHtml=`<div class="section-title">今後の予定（${cs.length}件）</div>`;
    cs.forEach(s=>{
      schedHtml+=`<div style="font-size:13px;padding:6px 0;border-bottom:1px solid var(--paper-warm);display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <span style="font-weight:600">${fmtFull(s.date)}</span>${s.time?`<span style="color:var(--ink-light);margin-left:4px">🕐${s.time}</span>`:""}
          <span class="badge ${badgeClass(s.type)}" style="margin-left:8px">${s.type}</span>
          <span class="badge ${s.status==='完了'?'badge-done':'badge-scheduled'}" style="margin-left:4px">${s.status||'予定'}</span>
          <span style="margin-left:8px;color:var(--gold)">${esc(monkStr(s.monk))}</span>
          ${s.memo?`<div style="color:var(--ink-light);margin-top:2px">${esc(s.memo)}</div>`:""}
        </div>
        <button class="btn btn-outline btn-sm" style="font-size:10px;padding:2px 8px;flex-shrink:0;margin-left:8px" onclick="closeModal('modal-detail');openScheduleModal('${s.id}')">編集</button>
      </div>`;
    });
  }
  // 過去の予定
  if(csPast.length>0){
    schedHtml+=`<div class="section-title" style="margin-top:12px">過去の予定（${csPast.length}件）</div>`;
    csPast.forEach(s=>{
      schedHtml+=`<div style="font-size:13px;padding:6px 0;border-bottom:1px solid var(--paper-warm);display:flex;justify-content:space-between;align-items:flex-start;opacity:0.75">
        <div>
          <span style="font-weight:600">${fmtFull(s.date)}</span>${s.time?`<span style="color:var(--ink-light);margin-left:4px">🕐${s.time}</span>`:""}
          <span class="badge ${badgeClass(s.type)}" style="margin-left:8px">${s.type}</span>
          <span class="badge ${s.status==='完了'?'badge-done':'badge-scheduled'}" style="margin-left:4px">${s.status||'予定'}</span>
          <span style="margin-left:8px;color:var(--gold)">${esc(monkStr(s.monk))}</span>
          ${s.memo?`<div style="color:var(--ink-light);margin-top:2px">${esc(s.memo)}</div>`:""}
        </div>
        <button class="btn btn-outline btn-sm" style="font-size:10px;padding:2px 8px;flex-shrink:0;margin-left:8px" onclick="closeModal('modal-detail');openScheduleModal('${s.id}')">編集</button>
      </div>`;
    });
  }
  if(!cs.length&&!csPast.length){
    schedHtml=`<div class="section-title">予定</div><div style="font-size:12px;color:var(--ink-light);padding:8px 0">予定はありません</div>`;
  }
  document.getElementById('detail-schedules').innerHTML=schedHtml;
  document.getElementById('detail-add-visit-btn').onclick=()=>{closeModal('modal-detail');openVisitModal(cid,null);};
  document.getElementById('ai-box-wrap').innerHTML="";

  let histHtml=cv.length>0
    ?`<div class="section-title" style="margin-top:16px">参拝記録（${cv.length}件）</div>`
      +cv.map(v=>`<div class="hist-item"><div class="hist-meta">${fmtFull(v.date)} ｜ ${v.type} ｜ 担当: ${esc(monkStr(v.monk))}${v.duration?` ｜ ${v.duration}分`:""}</div><div class="hist-content">${esc(v.content)}</div>${renderAttachLinks(v.attachments)}</div>`).join("")
    :`<div class="empty"><div class="empty-icon">📖</div><div>まだ記録がありません</div></div>`;
  document.getElementById('detail-history').innerHTML=histHtml;
  openModal('modal-detail');
}

function deleteContact(){
  const c=getContact(state.detailContactId);
  if(!c)return;
  const hasSchedules=state.schedules.filter(s=>s.contactId===c.id).length;
  const hasVisits=state.visits.filter(v=>v.contactId===c.id).length;
  let msg=`「${c.name}」を削除してよろしいですか？`;
  if(hasSchedules||hasVisits){
    msg+=`\n\n⚠ この門徒には予定${hasSchedules}件・記録${hasVisits}件が紐付いています。\n門徒を削除しても予定・記録のデータは残ります。`;
  }
  if(!confirm(msg))return;
  state.contacts=state.contacts.filter(x=>x.id!==c.id);
  deleteFromSheet('contacts',c.id);
  closeModal('modal-detail');
  renderContacts();
  renderCalendar();
  renderSchedule();
  setSyncStatus(`「${c.name}」を削除しました`);
  setTimeout(()=>setSyncStatus(""),3000);
}

async function getAiSummary(){
  const cid=state.detailContactId;
  const c=getContact(cid);
  const cv=getVisitsByContact(cid);

  const btn=document.getElementById('detail-ai-btn');

  document.getElementById('ai-box-wrap').innerHTML=`<div class="ai-box"><div class="ai-box-title">🤖 AI要約を生成中...</div></div>`;
  try{
    const history=cv.slice(0,5).map(v=>`【${fmtFull(v.date)} ${v.type} 担当:${monkStr(v.monk)}】${v.content}`).join("\n");
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        messages:[{role:"user",content:`あなたはお寺の僧侶のアシスタントです。以下は「${c.name}」への過去の参拝記録です。次回の訪問に向けて、覚えておくべき大切な情報（家族の状況、健康・悩み、法事の予定、前回の話題の続き等）を150字以内で簡潔にまとめてください。\n\n${history}`}]})
    });
    const d=await res.json();
    const text=d.content?.[0]?.text||"要約を取得できませんでした";
    document.getElementById('ai-box-wrap').innerHTML=`<div class="ai-box"><div class="ai-box-title">🤖 次回訪問前チェック</div><div class="ai-box-content">${esc(text)}</div></div>`;
  }catch{
    document.getElementById('ai-box-wrap').innerHTML=`<div class="ai-box"><div class="ai-box-title">⚠️ エラー</div><div class="ai-box-content">要約の取得に失敗しました</div></div>`;
  }
  btn.innerHTML="🤖 AI要約";btn.disabled=false;
}

function renderContactList(selectedId){
  const q=document.getElementById('s-contact-search').value.trim();
  const sorted=[...state.contacts].sort((a,b)=>{
    const ka=(a.kana||a.name||"").replace(/\s/g,"");
    const kb=(b.kana||b.name||"").replace(/\s/g,"");
    return ka.localeCompare(kb,'ja');
  });
  const filtered=q?sorted.filter(c=>c.name.includes(q)||(c.kana||"").includes(q)):sorted;
  const list=document.getElementById('s-contact-list');
  if(filtered.length===0){list.innerHTML=`<div style="padding:8px 12px;font-size:12px;color:var(--ink-light)">該当なし</div>`;return;}
  list.innerHTML=filtered.map(c=>`
    <div class="contact-list-item${c.id===selectedId?' selected':''}" onclick="selectContact('${c.id}','${esc(c.name)}')">
      <div>${esc(c.name)}</div>
      ${c.kana?`<div class="item-kana">${esc(c.kana)}</div>`:''}
    </div>`).join('');
}

function saveSchedule(){

  if(!contactId){alert("門徒を選択してください");return;}
  if(!date){alert("日付を入力してください");return;}

// ==================== TEMPLE EVENTS ====================
function badgeClassEvent(type){
  const map={"六藤会":"badge-other","坊守会":"badge-hooji","報恩講":"badge-monthly","僧侶研修会":"badge-scheduled","組会":"badge-other","教区研修会":"badge-scheduled","新年互例会":"badge-other","その他行事":"badge-other"};
  return map[type]||"badge-other";
}
let evFilter="all";
function setEvFilter(f){
  evFilter=f;
  document.getElementById('ev-filter-all').classList.toggle('selected',f==='all');
  document.getElementById('ev-filter-my').classList.toggle('selected',f==='my');
  renderEvents();
}
function renderEvents(){
  let evs=[...state.templeEvents].sort((a,b)=>a.date.localeCompare(b.date));
  if(evFilter==='my')evs=evs.filter(e=>(e.attendees||[]).includes(state.currentUser));
  const now=today();
  const upcoming=evs.filter(e=>e.date>=now&&e.status!=="完了");
  const past=evs.filter(e=>e.date<now||e.status==="完了");
  let html="";
  if(upcoming.length===0&&past.length===0){html=`<div class="empty"><div class="empty-icon">🏯</div><div>行事がありません</div></div>`;}
  if(upcoming.length>0){html+=`<div class="section-title">今後の行事</div>`;upcoming.forEach(e=>{html+=eventCard(e,false);});}
  if(past.length>0){html+=`<div class="section-title" style="margin-top:16px">過去・完了</div>`;past.forEach(e=>{html+=eventCard(e,true);});}
  document.getElementById('events-list').innerHTML=html;
}
function eventCard(e,faded){
  const dp=parseLocalDate(e.date);
  const recs=(e.records||[]);
  const hasRecord=recs.length>0;
  const attendeeStr=(e.attendees||[]).join("・")||"未定";
  return`<div class="card${faded?" faded":""}">
    <div class="scard">
      <div class="scard-date"><div class="scard-day">${dp?dp.day:""}</div><div class="scard-month">${dp?dp.m+"月":""}</div></div>
      <div class="scard-info">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
          <span style="font-weight:600;font-size:15px;cursor:pointer" onclick="openEventDetail('${e.id}')">${esc(e.title)}</span>
          <span class="badge ${badgeClassEvent(e.type)}">${e.type}</span>
          <span class="badge ${e.status==='完了'?'badge-done':'badge-scheduled'}">${e.status||'予定'}</span>
        </div>
        ${e.place?`<div style="font-size:12px;color:var(--ink-light)">📍 ${esc(e.place)}</div>`:""}
        <div style="font-size:12px;color:var(--gold);margin-top:2px">参加: ${esc(attendeeStr)}${e.time?`　🕐 ${e.time}`:""}</div>
        ${e.memo?`<div style="font-size:12px;color:var(--ink-light);margin-top:2px">${esc(e.memo)}</div>`:""}
        ${hasRecord?`<div style="font-size:11px;color:var(--green);margin-top:4px">📝 記録あり（${recs.length}件）</div>`:""}
        ${renderAttachLinks(e.attachments)}
      </div>
    </div>
    <div class="scard-btns">
      <button class="btn btn-outline btn-sm" onclick="openEventModal('${e.id}')">編集</button>
      <button class="btn btn-gold btn-sm" onclick="openEventDetail('${e.id}')">詳細・記録</button>
    </div>
  </div>`;
}

// ==================== CALENDAR ====================
function setCalView(v){
  state.calView=v;
  document.getElementById('cal-btn-month').classList.toggle('active',v==='month');
  document.getElementById('cal-btn-week').classList.toggle('active',v==='week');
  renderCalendar();
}
function setCalFilter(f){
  state.calFilter=f;
  document.getElementById('cal-filter-all').classList.toggle('selected',f==='all');
  document.getElementById('cal-filter-my').classList.toggle('selected',f==='my');
  renderCalendar();
}
function calMove(dir){
  if(state.calView==='month'){
    state.calMonth+=dir;
    if(state.calMonth>11){state.calMonth=0;state.calYear++;}
    if(state.calMonth<0){state.calMonth=11;state.calYear--;}
  }else{
    const d=new Date(state.calWeekStart);d.setDate(d.getDate()+dir*7);
    state.calWeekStart=dateToStr(d);
  }
  renderCalendar();
}
function getCalSchedules(){
  let ss=state.schedules;
  if(state.calFilter==='my')ss=ss.filter(s=>s.monk===state.currentUser);
  return ss;
}
function getCalEvents(){
  let es=state.templeEvents;
  if(state.calFilter==='my')es=es.filter(e=>(e.attendees||[]).includes(state.currentUser));
  return es;
}
function renderCalendar(){if(state.calView==='month')renderMonthCal();else renderWeekCal();}

function renderMonthCal(){
  const y=state.calYear,m=state.calMonth;
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent=`${y}年 ${MONTHS[m]}`;
  const schedules=getCalSchedules();
  const tevents=getCalEvents();
  const todayStr=today();
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const daysInPrev=new Date(y,m,0).getDate();
  const DOWS=['日','月','火','水','木','金','土'];
  let html=`<div><div class="cal-dow-row">${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div><div class="cal-weeks">`;
  let cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({d:daysInPrev-i,m:m-1,y:m===0?y-1:y,other:true});
  for(let i=1;i<=daysInMonth;i++)cells.push({d:i,m,y,other:false});
  while(cells.length%7!==0)cells.push({d:cells.length-daysInMonth-firstDay+1,m:m+1,y:m===11?y+1:y,other:true});
  for(let w=0;w<cells.length/7;w++){
    html+=`<div class="cal-week">`;
    for(let dow=0;dow<7;dow++){
      const cell=cells[w*7+dow];
      const dateStr=`${cell.y}-${String(cell.m+1).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
      const isToday=dateStr===todayStr;
      const holiday=getHoliday(dateStr);
      const isHoliday=!!holiday;
      const cls=['cal-cell',cell.other?'other-month':'',isToday?'today':'',dow===0||isHoliday?'sunday':'',dow===6?'saturday':''].filter(Boolean).join(' ');
      const dayScheds=schedules.filter(s=>s.date===dateStr);
      const dayEvs=tevents.filter(e=>e.date===dateStr);
      const allDay=[
        ...dayScheds.map(s=>({_kind:'sched',obj:s})),
        ...dayEvs.map(e=>({_kind:'event',obj:e}))
      ].sort((a,b)=>(a.obj.time||'99:99').localeCompare(b.obj.time||'99:99'));
      const pills=allDay.slice(0,2).map(({_kind,obj})=>{
        if(_kind==='event'){
          return`<div class="cal-event-pill cal-event-temple" onclick="event.stopPropagation();openEventDetail('${obj.id}')">🏯${esc(obj.title.slice(0,6))}</div>`;
        }
        const c=getContact(obj.contactId);
        const pc=obj.type==='月参り'?'cal-event-monthly':obj.type==='法事'?'cal-event-hooji':'cal-event-other';
        return`<div class="cal-event-pill ${pc}" onclick="event.stopPropagation();openDetail('${obj.contactId}')">${esc(c.name)}</div>`;
      }).join('');
      const more=allDay.length>2?`<div style="font-size:9px;color:var(--ink-light)">+${allDay.length-2}</div>`:'';
      const holidayLabel=isHoliday?`<div style="font-size:8px;color:#c0392b;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${holiday}</div>`:'';
      html+=`<div class="${cls}" onclick="openDayModal('${dateStr}')"><div class="cal-cell-day">${cell.d}</div>${holidayLabel}${pills}${more}</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div></div>`;
  html+=`<div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--ink-light);flex-wrap:wrap">
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px"></span>月参り</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:4px"></span>法事</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-right:4px"></span>その他</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#9b59b6;margin-right:4px"></span>寺院行事</span>
  </div>`;
  document.getElementById('cal-body').innerHTML=html;
}

function renderWeekCal(){
  if(!state.calWeekStart){
    const now=new Date();const day=now.getDay();const diff=day===0?-6:1-day;
    const mon=new Date(now);mon.setDate(now.getDate()+diff);
    state.calWeekStart=dateToStr(mon);
  }
  const schedules=getCalSchedules();
  const tevents=getCalEvents();
  const todayStr=today();
  const DOWS=['月','火','水','木','金','土','日'];
  const startDate=new Date(state.calWeekStart);
  const endDate=new Date(startDate);endDate.setDate(endDate.getDate()+6);
  const sm=startDate.getMonth()+1,sd=startDate.getDate();
  const em=endDate.getMonth()+1,ed=endDate.getDate();
  document.getElementById('cal-title').textContent=`${startDate.getFullYear()}年 ${sm}/${sd}–${em}/${ed}`;
  let html=`<div>`;
  for(let i=0;i<7;i++){
    const d=new Date(startDate);d.setDate(d.getDate()+i);
    const dateStr=dateToStr(d);
    const isToday=dateStr===todayStr;
    const holiday=getHoliday(dateStr);
    const numCls=isToday?'today-num':i===6?'sun':(i===5||holiday)?'sun':'';
    const dayScheds=[...schedules.filter(s=>s.date===dateStr)].sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
    const dayEvs=[...tevents.filter(e=>e.date===dateStr)].sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
    const allItems=[
      ...dayScheds.map(s=>({_kind:'sched',obj:s})),
      ...dayEvs.map(e=>({_kind:'event',obj:e}))
    ].sort((a,b)=>(a.obj.time||'99:99').localeCompare(b.obj.time||'99:99'));
    const schedHtml=allItems.map(({_kind,obj})=>{
      if(_kind==='event'){
        return`<div class="week-event week-event-temple" onclick="openEventDetail('${obj.id}')">
          <div class="week-event-name">🏯 ${esc(obj.title)}${obj.time?` <span style="font-weight:400;font-size:10px">🕐${obj.time}</span>`:''}</div>
          <div class="week-event-monk">参加: ${(obj.attendees||[]).join('・')||'未定'}</div>
        </div>`;
      }
      const c=getContact(obj.contactId);
      const ec=obj.type==='月参り'?'week-event-monthly':obj.type==='法事'?'week-event-hooji':'week-event-other';
      return`<div class="week-event ${ec}" onclick="openDetail('${obj.contactId}')">
        <div class="week-event-name">${esc(c.name)} <span style="font-weight:400;font-size:11px">${obj.type}</span>${obj.time?` <span style="font-weight:400;font-size:10px">🕐${obj.time}</span>`:''}</div>
        <div class="week-event-monk">担当: ${esc(Array.isArray(obj.monk)?obj.monk.join('・'):obj.monk||'')}</div>
      </div>`;
    }).join('');
    const evHtml='';
    const events=schedHtml+evHtml;
    html+=`<div class="week-day-row">
      <div class="week-day-header" onclick="openDayModal('${dateStr}')">
        <div class="week-day-name" style="${holiday?'color:#c0392b':''}">${DOWS[i]}</div>
        <div class="week-day-num ${numCls}">${d.getDate()}</div>
        ${holiday?`<div style="font-size:8px;color:#c0392b;line-height:1.2">${holiday}</div>`:''}
      </div>
      <div class="week-events">${events||'<div style="color:var(--border);font-size:11px;padding:4px 0">―</div>'}</div>
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('cal-body').innerHTML=html;
}

function openDayModal(dateStr){
  const dt=new Date(dateStr);
  const DOWS=['日','月','火','水','木','金','土'];
  document.getElementById('day-modal-title').textContent=`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${DOWS[dt.getDay()]}）`;
  const scheds=state.schedules.filter(s=>s.date===dateStr);
  const evs=state.templeEvents.filter(e=>e.date===dateStr);
  let html='';
  if(scheds.length===0&&evs.length===0){
    html=`<div class="empty" style="padding:24px 0"><div class="empty-icon">📭</div><div>この日の予定はありません</div></div>`;
  }else{
    // 門徒参り
    if(scheds.length>0){
      html+=`<div class="section-title">門徒参り（${scheds.length}件）</div>`;
      scheds.sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
      scheds.forEach(s=>{
        const c=getContact(s.contactId);
        const cv=getVisitsByContact(s.contactId);
        const last=cv[0];
        html+=`<div class="card" style="margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
            <span style="font-size:15px;font-weight:600;cursor:pointer;border-bottom:1px solid var(--border)" onclick="closeModal('modal-day');openDetail('${s.contactId}')">${esc(c.name)}</span>
            <span class="badge ${badgeClass(s.type)}">${s.type}</span>
            <span class="badge ${s.status==='完了'?'badge-done':'badge-scheduled'}">${s.status||'予定'}</span>
          </div>
          <div style="font-size:12px;color:var(--gold)">担当: ${esc(monkStr(s.monk))}${s.time?`　🕐 ${s.time}`:""}</div>
          ${s.memo?`<div style="font-size:12px;color:var(--ink-light);margin-top:4px">${esc(s.memo)}</div>`:''}
          ${renderAttachLinks(s.attachments)}
          ${last?`<div style="margin-top:6px;padding:6px 8px;background:var(--paper-warm);border-radius:4px;font-size:11px;color:var(--ink-light)">📖 前回 ${fmtDate(last.date)}（${esc(monkStr(last.monk))}）: ${esc(last.content.slice(0,50))}…</div>`:''}
          <div style="display:flex;gap:8px;margin-top:8px;justify-content:flex-end">
            <button class="btn btn-outline btn-sm" onclick="closeModal('modal-day');openScheduleModal('${s.id}')">編集</button>
            ${s.status!=='完了'?`<button class="btn btn-gold btn-sm" onclick="closeModal('modal-day');openVisitFromSched('${s.id}')">✓ 記録追加</button>`:''}
          </div>
        </div>`;
      });
    }
    // 寺院行事
    if(evs.length>0){
      html+=`<div class="section-title" style="${scheds.length>0?'margin-top:16px':''}">寺院行事（${evs.length}件）</div>`;
      evs.sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));
      evs.forEach(e=>{
        const attendeeStr=(e.attendees||[]).join('・')||'未定';
        html+=`<div class="card" style="margin-bottom:10px;border-left:3px solid #9b59b6">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
            <span style="font-size:15px;font-weight:600">🏯 ${esc(e.title)}</span>
            <span class="badge badge-temple">${e.type}</span>
            <span class="badge ${e.status==='完了'?'badge-done':'badge-scheduled'}">${e.status||'予定'}</span>
          </div>
          ${e.place?`<div style="font-size:12px;color:var(--ink-light)">📍 ${esc(e.place)}</div>`:''}
          <div style="font-size:12px;color:var(--gold);margin-top:2px">参加: ${esc(attendeeStr)}${e.time?`　🕐 ${e.time}`:""}</div>
          ${e.memo?`<div style="font-size:12px;color:var(--ink-light);margin-top:4px">${esc(e.memo)}</div>`:''}
          ${renderAttachLinks(e.attachments)}
          <div style="display:flex;gap:8px;margin-top:8px;justify-content:flex-end">
            <button class="btn btn-outline btn-sm" onclick="closeModal('modal-day');openEventModal('${e.id}')">編集</button>
            <button class="btn btn-gold btn-sm" onclick="closeModal('modal-day');openEventDetail('${e.id}')">詳細・記録</button>
          </div>
        </div>`;
      });
    }
  }
  document.getElementById('day-modal-body').innerHTML=html;
  // 日付モーダルの「＋予定追加」に日付を渡す
  document.querySelector('#modal-day .btn-primary').onclick=()=>{closeModal('modal-day');openScheduleModal(null);};
  openModal('modal-day');
}

function exportExcel(){
  const list=getSortedContacts();
  const header=["お名前","よみがな","郵便番号","住所","電話番号","メールアドレス","宗派","法名","墓地・納骨場所","家族構成","命日・故人名","備考","タグ"];
  const rows=list.map(c=>[
    c.name,c.kana||"",c.zip||"",c.address||"",c.phone||"",c.email||"",
    c.shu||"",c.houmyo||"",c.haka||"",c.family||"",
    (c.kinen||[]).map(k=>k.name+"("+k.date+")").join("／"),
    c.notes||"",(c.tags||[]).join("・")
  ]);
  // CSV with BOM for Excel Japanese support
  const bom="\uFEFF";
  const csv=bom+[header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`浄満寺門徒名簿_${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}${String(new Date().getDate()).padStart(2,'0')}.csv`;
  a.click();URL.revokeObjectURL(url);
}

function makeChips(containerId,options,selected,onChange,dataKey,multi=false){
  const sel=Array.isArray(selected)?selected:[selected];
  document.getElementById(containerId).innerHTML=options.map(o=>`
    <div class="chip${sel.includes(o)?" selected":""}" data-key="${dataKey}" data-val="${esc(o)}" onclick="toggleChip(this,'${dataKey}',${multi})">${esc(o)}</div>
  `).join("");
}
function toggleChip(el,key,multi){
  if(!multi){el.closest('.chip-row').querySelectorAll('[data-key="'+key+'"]').forEach(c=>c.classList.remove('selected'));}
  el.classList.toggle('selected');
}
function getSelectedChip(key){const el=document.querySelector(`.chip.selected[data-key="${key}"]`);return el?el.dataset.val:"";}
function getSelectedChips(key){return[...document.querySelectorAll(`.chip.selected[data-key="${key}"]`)].map(e=>e.dataset.val);}

// ==================== MODAL HELPERS ====================
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
</script>
